version: '3.8'
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wavehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wavehubpass}
      POSTGRES_DB: ${POSTGRES_DB:-wavehubdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-wavehub}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-wavehubpass}
      DATABASE_NAME: ${POSTGRES_DB:-wavehubdb}
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      TYPEORM_SYNC: ${TYPEORM_SYNC:-true}
    depends_on:
      - postgres
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - backend

volumes:
  pgdata:
