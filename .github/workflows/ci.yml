name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: wavehub
          POSTGRES_PASSWORD: wavehubpass
          POSTGRES_DB: wavehub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: wavehub
      DATABASE_PASSWORD: wavehubpass
      DATABASE_NAME: wavehub_test
      NODE_ENV: test
      JWT_SECRET: ci-only-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run backend:lint
      - run: npm run backend:build
      - run: npm run migration:run -w backend
      - run: npm run backend:test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run frontend:lint
      - run: npm run frontend:build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Fails the build on any known vulnerability in a production dependency. If this ever fires
      # on a transitive dependency that needs pinning past a CVE, add/update an `overrides` entry
      # in the ROOT package.json specifically — a workspace member's own `overrides` field is
      # silently ignored by npm. See CLAUDE.md's Security section for why that matters here.
      - run: npm audit --omit=dev
